# Suricata Threshold Configuration
# Suppresses noisy but benign signatures to reduce false positives
# Author: Willis
# Last updated: 2026-04-02

# Suppress noisy but benign signatures
suppress gen_id 1, sig_id 2016149
suppress gen_id 1, sig_id 2016150
suppress gen_id 1, sig_id 2102181

# Suppress Cloudflare Tunnel DNS alerts
suppress gen_id 1, sig_id 2047122

# Suppress Tailscale STUN on port 41641
suppress gen_id 1, sig_id 2016149, track by_dst, ip 172.20.13.236
suppress gen_id 1, sig_id 2016150, track by_dst, ip 172.20.13.236
